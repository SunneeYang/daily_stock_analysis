name: long_term_growth_with_moat
display_name: 中期成长·技术壁垒策略
description: 关注1-3年内具有长足增长潜力的产业，优选拥有技术壁垒的龙头企业

category: trend

# 关联的核心交易理念编号
core_rules: [3, 4, 5]  # 效率优先 + 买点偏好 + 风险排查（去掉短线趋势相关规则）

# 策略需要使用的工具列表
required_tools:
  - get_daily_history
  - get_realtime_quote
  - search_stock_news
  - get_sector_rankings

instructions: |
  **中期成长·技术壁垒策略**

  核心理念：寻找具备技术护城河的优质企业，在成长性明确的赛道进行中期配置。
  **本策略关注中长期价值，不因短期空头排列而否定股票。**

  **⚠️ 重要：本策略覆盖以下核心交易理念：**
  - **不适用规则2（趋势交易）**：本策略不要求 MA5>MA10>MA20 多头排列，短期空头排列不是拒绝理由
  - **不适用规则1（严进策略）**：本策略关注估值合理性而非短期乖离率
  - **保留规则3、4、5**：效率优先、买点偏好、风险排查仍然适用

  **筛选标准：**

  1. **产业前景分析（1-3年维度）**
     - **优选国家战略支持的新兴产业**（重点关注十五五规划方向）
     - 行业处于成长期或成熟期早期，具备持续扩容的市场空间
     - 关注政策红利、技术突破、消费升级等长期驱动力
     - 使用 `search_stock_news` 查阅行业深度研报和政策动向

  **1.1 国家战略契合度评估（关键加分项）**

  **Tier 1 - 最高优先级（十五六大未来产业，战略前瞻布局）**
  - ✅ 量子科技：量子计算、量子通信、量子测量
  - ✅ 生物制造：合成生物学、生物基材料、酶工程
  - ✅ 氢能和核聚变能：绿氢、储运、可控核聚变
  - ✅ 脑机接口：非侵入式/侵入式脑机、神经调控
  - ✅ 具身智能：人形机器人、智能机器人、机器人AI
  - ✅ 第六代移动通信(6G)：6G设备、卫星互联网、太赫兹

  **Tier 2 - 高优先级（新兴支柱产业，3-5年规模化）**
  - ⭐ 低空经济：eVTOL、工业无人机、通航运营（市场：2025年1.5万亿→2030年3.5万亿）
  - ⭐ 集成电路：设计、制造、封装、设备/材料全链条
  - ⭐ 生物医药：创新药、高端医疗器械、疫苗、基因治疗
  - ⭐ 航空航天：商业航天、卫星互联网、大飞机供应链
  - ⭐ 人工智能+：算力、大模型、AI应用（制造/医疗/教育/金融）
  - ⭐ 新能源+新材料：风电、光伏、储能、新型电力系统

  **Tier 3 - 中等优先级（战略性新兴产业）**
  - 📌 工业母机：高档数控机床、制造装备
  - 📌 高端仪器：科研仪器、检测设备、测量仪器
  - 📌 基础软件：操作系统、数据库、工业软件、EDA
  - 📌 先进材料：高端合金、复合材料、超导材料

  **Tier 4 - 基础优先级（传统升级+绿色低碳）**
  - 🔄 绿色低碳转型（单位GDP二氧化碳排放降17%目标）
  - 🔄 新型基础设施：算力网络、5G-A/5.5G、数据中心
  - 🔄 产业链自主可控：制造业重点产业链高质量发展

  **国家战略契合度评分标准：**
  - 纳入十五五大未来产业：+5分
  - 纳入新兴支柱产业：+3分
  - 属于"卡脖子"攻关领域（集成电路/工业母机/高端仪器/基础软件/先进材料/生物制造）：+3分
  - 专精特新/小巨人/单项冠军企业：+2分
  - 国家级产业集群龙头企业：+2分
  - **评分 ≥ 8分：强烈推荐，给予战略溢价**
  - **评分 5-7分：推荐，重点关注**
  - **评分 3-4分：中性，需更强基本面支撑**
  - **评分 < 3分：谨慎介入**

  2. **技术壁垒评估**
     - 核心技术自主可控，拥有专利护城河
     - 研发投入占比高于行业平均水平（通常 > 5%）
     - 在细分领域具备技术领先优势或市场份额优势
     - 客户粘性强，转换成本高

  3. **基本面质量**
     - 营收和净利润保持稳健增长（近2年CAGR > 15%）
     - ROE > 15%，盈利质量优秀
     - 现金流健康，负债率合理
     - 治理结构规范，无重大违法违规记录

  4. **价位评估**（而非短期趋势）
     - 使用 `get_realtime_quote` 确认当前价位
     - 关注相对估值水平（PE/PB 与行业历史对比）
     - 使用 `get_daily_history` 查看中长期价格区间
     - **不因短期空头排列而拒绝优质标的**，中长期投资可以容忍短期技术面走弱

  5. **入场时机**
     - 关注估值合理性，优先在相对低位配置
     - 避开短期爆炒后的高位，等待理性回归
     - 分批建仓，平滑成本

  6. **中长期价格目标评估**
     - **估值目标**：基于历史 PE/PB 区间，计算合理估值上限
     - **业绩目标**：基于预期净利润增长率，推算 1-2 年后目标价
       - 目标价 = 当前 EPS × (1+预期增长率) × 合理 PE
     - **技术目标**：使用 `get_daily_history` 识别中长期阻力位和前期高点
     - **分批止盈策略**：
       - 达到估值目标上限时，减仓 30-50% 锁定收益
       - 达到技术阻力位且基本面无变化时，适当减仓
       - 产业逻辑兑现、估值合理回归时，考虑清仓
     - **持有期目标**：3-12 个月，根据产业兑现情况动态调整
     - **在分析报告中必须给出**：
       - 当前价格 vs 合理估值区间
       - 12 个月目标价格及测算依据
       - 建议仓位配置（初次/加仓/减仓时机）

  **风险排查：**
  - 使用 `search_stock_news` 排查重大利空（财务造假、监管处罚、核心技术人员流失）
  - 利空新闻一票否决
  - 避开估值严重透支未来增长的个股
  - 谨慎对待技术迭代风险高的行业

  **持仓建议：**
  - 中期持有为主（3-12个月），容忍合理波动
  - 定期复评产业逻辑和公司竞争力变化
  - 当产业逻辑破坏或技术优势丧失时，果断离场
  - **短期趋势转弱不一定是卖出信号**，需结合基本面判断

  **评分调整：**
  - sentiment_score 基础分 +0.3（具备中期成长逻辑）
  - 国家战略契合度额外加分：Tier1+0.5分、Tier2+0.3分、Tier3+0.2分、Tier4+0.1分
  - 风险调整：Tier1高波动风险-0.1分、估值透支-0.2分、业绩不及预期-0.3分
  - buy_reason 必须注明："[中期成长·技术壁垒] 产业：XXX，技术：XXX，契合度：X分/TierX"

  **未来产业特别风险提示（Tier 1六大未来产业）：**
  - 技术不确定性：多数处于实验室或早期商业化，技术路线可能变更
  - 商业化周期长：从技术突破到规模化应用可能需5-10年
  - 政策依赖性强：高度依赖国家政策支持和资金投入
  - 估值波动极大：概念炒作频繁，估值可能严重透支未来
  - 竞争格局未定：技术路线、商业模式、龙头地位均未固化
  - 针对Tier 1特殊要求：必须核实技术成熟度（TRL等级）、商业化时间表（3年内能否产生实际收入）、资金实力（能否支撑到商业化落地）、仓位单只不超过5%总体不超过30%、止损线-20%

  **分析报告必需内容清单：**
  1. 国家战略契合度分析：所属产业层级（Tier X/XXX产业）、产业地位（龙头/跟随/新兴）、专精特新资质（是/否，如是指明：小巨人/单项冠军/隐形冠军）、卡脖子属性（是/否，如是说明具体环节）、国家战略契合度得分（X分/满15分）、评级（强烈推荐/推荐/中性/谨慎）
  2. 技术壁垒评估：核心技术、专利护城河（发明专利数量/核心专利）、研发投入占比（XX%/行业平均XX%）、技术领先性（国际/国内/行业领先）、客户粘性（高/中/低，转换成本）
  3. 基本面质量：营收增长（近2年CAGR XX%）、盈利能力（ROE XX%/净利率XX%）、财务健康（资产负债率XX%/经营性现金流XXX）、治理结构（规范/一般/需改进）
  4. 价位评估：当前价格XXX元、估值水平PE XX倍（行业历史区间XX-XX倍/当前位置XX%分位）、合理估值区间XXX-XXX元、当前位置（低估/合理/高估）
  5. 12个月目标价：业绩预期EPS XX元（当前EPS XX元/增长率XX%）、目标价XXX元=当前EPS×(1+增长率)×目标PE、涨幅空间+XX%/-XX%、建议仓位（初次X%/加仓时机XXX/止盈时机XXX）
  6. 风险提示：核心风险XXX、止损位XXX元（-XX%）

  **动态调整触发条件：**
  - 定期复评（每季度末）：国家战略契合度得分变化（±2分以上）、产业逻辑变化、技术突破或商业化进展是否不及预期
  - 不定期调整触发条件：1)重大政策出台（专项规划落地/大基金设立/税收优惠） 2)技术里程碑（核聚变点火/6G商用/人形机器人量产/公司技术突破） 3)业绩兑现验证（季报年报vs预期偏差±20%需重评/商业化进展收入结构变化客户拓展） 4)估值风险（PE超行业历史80%分位考虑减仓/概念炒作导致估值脱离基本面果断减仓）

  **产业关键词快速参考（search_stock_news搜索用）：**
  - Tier1六大未来产业：量子科技(量子计算/通信/测量/芯片)、生物制造(合成生物/生物基材料/酶工程)、氢能核聚变(绿氢/储运/核聚变)、脑机接口(神经调控/脑机芯片)、具身智能(人形机器人/机器人AI)、6G(太赫兹/卫星互联网)
  - Tier2新兴支柱产业：低空经济(eVTOL/无人机/通航，1.5万亿→3.5万亿)、集成电路全链条、生物医药(创新药/高端器械)、航空航天(商业航天/卫星互联网)、AI+(算力/大模型/AI应用)、新能源新材料(风电/光伏/储能/固态电池)
  - Tier3战略性新兴产业：工业母机(数控机床)、高端仪器(科研仪器)、基础软件(操作系统/数据库/工业软件/EDA)、先进材料(复合材料/超导材料)
  - Tier4传统升级绿色低碳：绿色低碳(碳排降17%)、新型基建(算力网络/5G-A)、产业链自主可控
  - 搜索技巧：使用search_stock_news工具，组合搜索"股票名称+关键词"

  **政策催化时间轴2026-2030：**
  - 2026年十五五开局专项规划出台未来产业投入机制建立、重点关注Tier1早期布局政策落地受益股
  - 2027-2028年6G标准制定低空经济规模化碳达峰攻坚、Tier2业绩兑现期关注商业化龙头
  - 2029-2030年碳达峰目标实现规划验收未来产业商业化、关注Tier1技术突破加商业化标的
  - 择时原则：政策提前3-6个月布局、业绩兑现期前获利了结

  **组合配置与风险控制：**
  - 推荐配置100%：Tier1未来产业30-40%（高波动高成长单只≤5%）、Tier2新兴支柱40-50%（稳健成长单只≤8%）、Tier3-4战略新兴传统升级10-30%（防御配置单只≤10%）
  - 止损止盈纪律：Tier1止损线-20%止盈+50%或技术突破兑现、Tier2止损线-15%止盈+30%或业绩超预期、Tier3-4止损线-10%止盈+20%或估值修复
  - 季度复评清单：国家战略契合度得分是否变化、产业逻辑是否破坏、技术突破或商业化进展是否符合预期、估值是否合理（PE分位）、业绩是否兑现（vs预期）
